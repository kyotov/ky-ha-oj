apiVersion: batch/v1
kind: CronJob
metadata:
  name: prometheus-backup
  namespace: monitoring
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rsync
              image: alpine:latest
              command:
                - sh
                - -c
                - |
                  apk add --no-cache rsync && \
                  rsync -a --delete /source/ /backup/
              volumeMounts:
                - name: source
                  mountPath: /source
                  readOnly: true
                - name: backup
                  mountPath: /backup
          volumes:
            - name: source
              persistentVolumeClaim:
                claimName: prometheus-db-prometheus-prometheus-kube-prometheus-prometheus-0
                readOnly: true
            - name: backup
              hostPath:
                path: /home/kamen/work/20260312/prometheus-data-backup
                type: DirectoryOrCreate
